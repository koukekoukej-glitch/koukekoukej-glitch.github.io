<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=../#tl-agent">
<title>TL Agent — 跳转中</title>
<link rel="canonical" href="../#tl-agent">
<style>
  html, body { margin: 0; padding: 0; background: #171717; color: #F2EAD3;
    font-family: 'Inter', 'Noto Sans SC', -apple-system, system-ui, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    letter-spacing: .02em; }
  .box { text-align: center; max-width: 480px; padding: 32px; }
  .label { font-size: 12px; letter-spacing: .26em; text-transform: uppercase;
    color: rgba(242, 234, 211, 0.5); margin-bottom: 14px; }
  .msg { font-size: 17px; line-height: 1.6; margin-bottom: 22px; opacity: .85; }
  a { color: #F2EAD3; border-bottom: 1px solid rgba(242, 234, 211, 0.4);
    padding-bottom: 1px; text-decoration: none; transition: opacity .3s; }
  a:hover { opacity: .7; }
</style>
</head>
<body>
<div class="box">
  <div class="label">Redirecting</div>
  <p class="msg">页面已迁移到新的简历主页、正在跳转……</p>
  <p><a href="../#tl-agent">如未自动跳转、点这里前往新地址</a></p>
</div>
<script>
  /* fallback: 部分浏览器对相对路径的 meta refresh 处理有差异、用 JS 兜底 */
  setTimeout(function() {
    location.replace('../#tl-agent');
  }, 50);
</script>
</body>
</html>
